<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        
        <div class="search">
            <input type="text" id="city-input" placeholder="Enter city name" spellcheck="false">
            <button id="search-btn">Search</button>
        </div>

        
        <div class="weather-info">
            <h2 id="city">Colombo</h2>
            <h1 id="temp">28°C</h1>
            <p id="description">Clear Sky</p>
            <img src="https://openweathermap.org/img/wn/01d@2x.png" id="weather-icon" alt="weather icon">
        </div>
        
        
        <div class="error-msg" style="display: none;">
            <p>Invalid City Name!</p>
        </div>
    </div>

    
    <script src="script.js"></script>
</body>
</html>
